name: release

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

permissions:
  contents: write

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - run: cargo clippy --all-targets -- -D warnings

  unit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - run: cargo test

  release:
    needs: [fmt, clippy, unit]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Decide whether to publish
      id: gate
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        set -euo pipefail

        if [[ ! -f VERSION ]]; then
          echo "::error::VERSION file is missing at the repository root"
          exit 1
        fi

        version="$(sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' VERSION)"
        if [[ -z "${version}" ]]; then
          echo "::error::VERSION is empty after trimming whitespace"
          exit 1
        fi

        tag="v${version}"

        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "tag=${tag}" >> "$GITHUB_OUTPUT"

        if [[ "${version}" == *-dev ]]; then
          echo "VERSION ${version} ends with -dev; skipping release."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ "${GITHUB_EVENT_NAME}" != "push" || "${GITHUB_REF}" != "refs/heads/main" ]]; then
          echo "This workflow only publishes from push events on main; skipping release."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if gh release view "${tag}" >/dev/null 2>&1; then
          echo "::warning::GitHub release ${tag} already exists; skipping publish."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "skip=false" >> "$GITHUB_OUTPUT"

    - uses: dtolnay/rust-toolchain@stable
      if: steps.gate.outputs.skip == 'false'

    - name: Build release artifact
      if: steps.gate.outputs.skip == 'false'
      run: cargo build --release --target=x86_64-unknown-linux-gnu

    - name: Prepare release assets
      if: steps.gate.outputs.skip == 'false'
      shell: bash
      run: |
        set -euo pipefail
        artifact="libenvoy_acme-${{ steps.gate.outputs.version }}-x86_64-unknown-linux-gnu.so"
        cp target/x86_64-unknown-linux-gnu/release/libenvoy_acme.so "${artifact}"
        sha256sum "${artifact}" > "${artifact}.sha256"

    - name: Publish GitHub release
      if: steps.gate.outputs.skip == 'false'
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        tag_name: ${{ steps.gate.outputs.tag }}
        name: ${{ steps.gate.outputs.tag }}
        files: |
          libenvoy_acme-${{ steps.gate.outputs.version }}-x86_64-unknown-linux-gnu.so
          libenvoy_acme-${{ steps.gate.outputs.version }}-x86_64-unknown-linux-gnu.so.sha256
