name: ci

on:
  push:
    branches:
    - main
  pull_request:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - run: cargo clippy --all-targets -- -D warnings

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - run: cargo build --release --target=x86_64-unknown-linux-gnu
    - uses: actions/upload-artifact@v4
      with:
        name: libenvoy_acme-x86_64-unknown-linux-gnu
        path: target/x86_64-unknown-linux-gnu/release/libenvoy_acme.so
        retention-days: 14

  unit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - run: cargo test

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: coverage
    - name: Install cargo-tarpaulin
      id: tarpaulin_install
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-tarpaulin
      continue-on-error: true
    - name: Fallback install cargo-tarpaulin
      if: steps.tarpaulin_install.outcome != 'success'
      run: cargo install cargo-tarpaulin --locked
    - name: Run unit test coverage
      # --exclude-files: see CONTRIBUTING.md "Coverage exclusions" — reserved
      # for code that genuinely cannot be unit-tested (currently only FFI
      # entry points in src/lib.rs).
      run: |
        cargo tarpaulin \
          --workspace \
          --exclude-files 'src/lib.rs' \
          --exclude-files 'src/test_stubs.rs' \
          --timeout 180 \
          --out Xml --out Html \
          --output-dir target/tarpaulin \
          --skip-clean
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: target/tarpaulin/
        retention-days: 14
        if-no-files-found: error

  integration:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2

    - name: Start compose stack
      run: docker compose up --build -d

    - name: Register DNS names in challtestsrv
      run: |
        set -euo pipefail
        # Wait for challtestsrv management API to become available.
        for i in $(seq 1 30); do
          curl -s -o /dev/null http://localhost:8055/ && break || true
          sleep 1
        done
        # Resolve the envoy container's IP on the compose network so that
        # Pebble can reach it during HTTP-01 validation.
        ENVOY_IP=$(docker inspect \
          "$(docker compose ps -q envoy)" \
          --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
        echo "Registering a.example.test \u2192 ${ENVOY_IP}"
        curl -sf -X POST http://localhost:8055/add-a \
          -H "Content-Type: application/json" \
          -d "{\"host\":\"a.example.test\",\"addresses\":[\"${ENVOY_IP}\"]}"
        echo "Registering b.example.test \u2192 ${ENVOY_IP}"
        curl -sf -X POST http://localhost:8055/add-a \
          -H "Content-Type: application/json" \
          -d "{\"host\":\"b.example.test\",\"addresses\":[\"${ENVOY_IP}\"]}"

    - name: Wait for certificate issuance (up to 120 s)
      run: |
        set -euo pipefail
        for i in $(seq 1 60); do
          # The image ships a self-signed placeholder cert whose issuer
          # CN is "a.example.test". Once FilesystemSink overwrites it with
          # a Pebble-issued cert, the issuer DN changes (Pebble's CA CN
          # contains "Pebble"). Wait until the issuer is no longer the
          # placeholder.
          ISSUER=$(docker compose exec -T envoy \
            openssl x509 \
              -in /var/lib/envoy-acme/certs/a.example.test.cert.pem \
              -noout -issuer 2>/dev/null || true)
          case "${ISSUER}" in
            *Pebble*) exit 0 ;;
          esac
          sleep 2
        done
        echo "certificate not issued by Pebble in time" >&2
        echo "last issuer line: ${ISSUER:-<none>}" >&2
        docker compose logs envoy pebble challtestsrv
        exit 1

    - name: Fetch Pebble runtime root CA
      run: |
        set -euo pipefail
        # Pebble generates a fresh root CA on every startup; pebble.minica.pem
        # only signs Pebble's *own* TLS server cert, not the certs Pebble issues.
        # Fetch the runtime root via the management API (:15000) so we can
        # verify the issued chain and trust it from curl.
        curl -sSf \
          --cacert config/pebble-certs/pebble.minica.pem \
          https://localhost:15000/roots/0 \
          > /tmp/pebble.root.pem
        test -s /tmp/pebble.root.pem

    - name: Verify certificate content and chain
      run: |
        set -euo pipefail
        # Export the issued certificate from the container for verification.
        # Multi-SAN certs use the first domain as the canonical filename prefix.
        docker compose exec -T envoy \
          cat /var/lib/envoy-acme/certs/a.example.test.cert.pem > /tmp/a.example.test.cert.pem

        # Both SANs must be present in the issued cert.
        openssl x509 -in /tmp/a.example.test.cert.pem -noout \
          -ext subjectAltName | grep -q "DNS:a.example.test"
        openssl x509 -in /tmp/a.example.test.cert.pem -noout \
          -ext subjectAltName | grep -q "DNS:b.example.test"

        # Certificate must chain to Pebble's runtime root CA.
        # Pebble returns leaf + intermediate in the PEM chain; extract the
        # leaf cert first so openssl verify can treat the rest as untrusted
        # intermediates.
        openssl x509 -in /tmp/a.example.test.cert.pem > /tmp/a.example.test.leaf.pem
        test -s /tmp/a.example.test.leaf.pem
        openssl verify \
          -CAfile /tmp/pebble.root.pem \
          -untrusted /tmp/a.example.test.cert.pem \
          /tmp/a.example.test.leaf.pem

    - name: HTTPS end-to-end request (both SANs)
      run: |
        set -euo pipefail
        # Verify HTTPS works for a.example.test.
        RESP_A=$(curl -sSf \
          --cacert /tmp/pebble.root.pem \
          --resolve a.example.test:8443:127.0.0.1 \
          https://a.example.test:8443/)
        echo "Response (a.example.test): ${RESP_A}"
        echo "${RESP_A}" | grep -q "hello from upstream"

        # Verify HTTPS works for b.example.test (same cert, second SAN).
        RESP_B=$(curl -sSf \
          --cacert /tmp/pebble.root.pem \
          --resolve b.example.test:8443:127.0.0.1 \
          https://b.example.test:8443/)
        echo "Response (b.example.test): ${RESP_B}"
        echo "${RESP_B}" | grep -q "hello from upstream"

        # Verify the cert presented on each SNI name contains both SANs.
        for NAME in a.example.test b.example.test; do
          SAN=$(echo | openssl s_client \
            -connect 127.0.0.1:8443 \
            -servername "${NAME}" 2>/dev/null \
            | openssl x509 -noout -ext subjectAltName)
          echo "SANs for ${NAME}: ${SAN}"
          echo "${SAN}" | grep -q "DNS:a.example.test"
          echo "${SAN}" | grep -q "DNS:b.example.test"
        done

    - name: Dump logs on failure
      if: failure()
      run: docker compose logs envoy pebble challtestsrv

    - name: Tear down
      if: always()
      run: docker compose down -v

  deny:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: deny
    - uses: EmbarkStudios/cargo-deny-action@v2

  release:
    needs: [fmt, clippy, build, unit, integration, coverage, deny]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Decide whether to publish
      id: gate
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        set -euo pipefail

        if [[ ! -f VERSION ]]; then
          echo "::error::VERSION file is missing at the repository root"
          exit 1
        fi

        version="$(sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' VERSION)"
        if [[ -z "${version}" ]]; then
          echo "::error::VERSION is empty after trimming whitespace"
          exit 1
        fi

        if [[ "${version}" == *-dev ]]; then
          echo "VERSION ${version} ends with -dev; skipping release."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        tag="v${version}"
        if gh release view "${tag}" >/dev/null 2>&1; then
          echo "::warning::GitHub release ${tag} already exists; skipping publish."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "skip=false" >> "$GITHUB_OUTPUT"
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "tag=${tag}" >> "$GITHUB_OUTPUT"

    - uses: actions/download-artifact@v4
      if: steps.gate.outputs.skip == 'false'
      with:
        name: libenvoy_acme-x86_64-unknown-linux-gnu
        path: ./artifact

    - name: Prepare release assets
      if: steps.gate.outputs.skip == 'false'
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p dist
        staged="dist/libenvoy_acme-${{ steps.gate.outputs.version }}-x86_64-unknown-linux-gnu.so"
        cp ./artifact/libenvoy_acme.so "${staged}"
        test -s "${staged}"
        sha256sum "${staged}" > "${staged}.sha256"

    - name: Install syft (SBOM generator)
      if: steps.gate.outputs.skip == 'false'
      uses: anchore/sbom-action/download-syft@v0

    - name: Generate SBOM
      if: steps.gate.outputs.skip == 'false'
      shell: bash
      run: |
        set -euo pipefail
        staged="dist/libenvoy_acme-${{ steps.gate.outputs.version }}-x86_64-unknown-linux-gnu.so"
        syft packages . \
          --source-name "envoy_acme" \
          --source-version "${{ steps.gate.outputs.version }}" \
          -o cyclonedx-json \
          --file "dist/envoy_acme-${{ steps.gate.outputs.version }}.sbom.json"

    - name: Install cosign
      if: steps.gate.outputs.skip == 'false'
      uses: sigstore/cosign-installer@v3

    - name: Sign release artifact and SBOM (keyless / OIDC)
      if: steps.gate.outputs.skip == 'false'
      shell: bash
      run: |
        set -euo pipefail
        staged="dist/libenvoy_acme-${{ steps.gate.outputs.version }}-x86_64-unknown-linux-gnu.so"
        sbom="dist/envoy_acme-${{ steps.gate.outputs.version }}.sbom.json"

        cosign sign-blob \
          --yes \
          --output-signature "${staged}.sig" \
          --output-certificate "${staged}.pem" \
          "${staged}"

        cosign sign-blob \
          --yes \
          --output-signature "${sbom}.sig" \
          --output-certificate "${sbom}.pem" \
          "${sbom}"

    - name: Attest build provenance (SLSA v1)
      if: steps.gate.outputs.skip == 'false'
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: |
          dist/libenvoy_acme-${{ steps.gate.outputs.version }}-x86_64-unknown-linux-gnu.so
          dist/envoy_acme-${{ steps.gate.outputs.version }}.sbom.json

    - name: Publish GitHub release
      if: steps.gate.outputs.skip == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.gate.outputs.tag }}
        name: ${{ steps.gate.outputs.tag }}
        generate_release_notes: true
        files: |
          dist/libenvoy_acme-${{ steps.gate.outputs.version }}-x86_64-unknown-linux-gnu.so
          dist/libenvoy_acme-${{ steps.gate.outputs.version }}-x86_64-unknown-linux-gnu.so.sha256
          dist/libenvoy_acme-${{ steps.gate.outputs.version }}-x86_64-unknown-linux-gnu.so.sig
          dist/libenvoy_acme-${{ steps.gate.outputs.version }}-x86_64-unknown-linux-gnu.so.pem
          dist/envoy_acme-${{ steps.gate.outputs.version }}.sbom.json
          dist/envoy_acme-${{ steps.gate.outputs.version }}.sbom.json.sig
          dist/envoy_acme-${{ steps.gate.outputs.version }}.sbom.json.pem
