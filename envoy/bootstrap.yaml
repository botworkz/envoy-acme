# Example Envoy bootstrap demonstrating the envoy-acme integration.
#
#   * Port 80  (HTTP)  routes ACME HTTP-01 challenges through the ext_proc
#     filter, which is answered directly by envoy-acme. All other traffic is
#     forwarded to the demo upstream.
#   * Port 443 (HTTPS) terminates TLS using a certificate delivered dynamically
#     over SDS by envoy-acme (resource name: "acme_cert").
#
# The envoy-acme service is expected to be reachable as the DNS name
# `envoy-acme` exposing ext_proc on :9000 and SDS on :9001 (see compose.yaml).

node:
  id: envoy-acme-demo
  cluster: envoy-acme-demo

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: http
      address:
        socket_address: { address: 0.0.0.0, port_value: 80 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: demo_upstream }
                http_filters:
                  # The ext_proc filter mirrors request headers to envoy-acme,
                  # which answers ACME HTTP-01 challenges directly.
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc:
                          cluster_name: envoy_acme_ext_proc
                        timeout: 2s
                      failure_mode_allow: true
                      processing_mode:
                        request_header_mode: SEND
                        response_header_mode: SKIP
                        request_body_mode: NONE
                        response_body_mode: NONE
                        request_trailer_mode: SKIP
                        response_trailer_mode: SKIP
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    - name: https
      address:
        socket_address: { address: 0.0.0.0, port_value: 443 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_https
                route_config:
                  name: local_route_https
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: demo_upstream }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                # Certificate is delivered dynamically by envoy-acme over SDS.
                tls_certificate_sds_secret_configs:
                  - name: acme_cert
                    sds_config:
                      resource_api_version: V3
                      api_config_source:
                        api_type: GRPC
                        transport_api_version: V3
                        grpc_services:
                          - envoy_grpc:
                              cluster_name: envoy_acme_sds

  clusters:
    - name: demo_upstream
      type: STRICT_DNS
      connect_timeout: 1s
      load_assignment:
        cluster_name: demo_upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: upstream, port_value: 8080 }

    - name: envoy_acme_ext_proc
      type: STRICT_DNS
      connect_timeout: 1s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: envoy_acme_ext_proc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: envoy-acme, port_value: 9000 }

    - name: envoy_acme_sds
      type: STRICT_DNS
      connect_timeout: 1s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: envoy_acme_sds
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: envoy-acme, port_value: 9001 }
